name: Feedback / 反馈
description: Share anything about HTMLxMarkdown.
title: "[Feedback]: "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying HTMLxMarkdown.

        Write anything. Any language is welcome. English and Chinese are both OK.

        感谢你试用 HTMLxMarkdown。

        想写什么都可以。任何语言都欢迎，中文、英文都可以。
  - type: textarea
    id: feedback
    attributes:
      label: Feedback / 反馈
      description: Write anything. Bug, idea, question, complaint, screenshot notes, workflow context — all welcome.
      placeholder: |
        Write anything here.

        想写什么都可以。
    validations:
      required: true
